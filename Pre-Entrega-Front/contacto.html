   <main class="contenedor-contacto">

    <!-- Sección del Formulario -->
    <section class="seccion-formulario">
        <form action="https://formspree.io/f/mbdqrpzz" method="POST" class="formulario">
            <h2>Envíanos un mensaje</h2>
            <input type="text" name="Nombre" placeholder="Tu nombre" required>
            <input type="email" name="Email" id="email" placeholder="Tu correo electrónico" required>
            <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
            <button type="submit" class="btn-enviar">Enviar mensaje</button>
        </form>
    </section>


</main>
